<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TIC TAC TOE+</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Mono:wght@300;400;500&family=Press+Start+2P&family=Playfair+Display:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   THEME VARIABLES
═══════════════════════════════════════════════════════ */
:root {
  --bg: #0a0a0f;
  --panel: #11111a;
  --border: #1e1e2e;
  --x-color: #ff4d6d;
  --o-color: #4cc9f0;
  --x-glow: rgba(255,77,109,0.4);
  --o-glow: rgba(76,201,240,0.4);
  --text: #e8e8f0;
  --muted: #55556a;
  --accent: #f8f830;
  --font-title: 'Black Han Sans', sans-serif;
  --font-body: 'DM Mono', monospace;
  --font-cell: 'Black Han Sans', sans-serif;
  --cell-radius: 10px;
  --board-gap: 8px;
  --bg-effect: none;
}

/* RETRO */
body.theme-retro {
  --bg: #1a0a2e;
  --panel: #0d0d1a;
  --border: #3d1a5c;
  --x-color: #ff00ff;
  --o-color: #00ffff;
  --x-glow: rgba(255,0,255,0.5);
  --o-glow: rgba(0,255,255,0.5);
  --text: #e0e0ff;
  --muted: #6644aa;
  --accent: #ffff00;
  --font-title: 'Press Start 2P', monospace;
  --font-body: 'Press Start 2P', monospace;
  --font-cell: 'Press Start 2P', monospace;
  --cell-radius: 0px;
  --board-gap: 4px;
}

/* MODERN */
body.theme-modern {
  --bg: #f0f0f5;
  --panel: #ffffff;
  --border: #e0e0ea;
  --x-color: #6c63ff;
  --o-color: #ff6584;
  --x-glow: rgba(108,99,255,0.3);
  --o-glow: rgba(255,101,132,0.3);
  --text: #1a1a2e;
  --muted: #9999bb;
  --accent: #6c63ff;
  --font-title: 'Playfair Display', serif;
  --font-body: 'DM Mono', monospace;
  --font-cell: 'Playfair Display', serif;
  --cell-radius: 16px;
  --board-gap: 10px;
}

/* SUNSHINE */
body.theme-sunshine {
  --bg: #fff8e7;
  --panel: #fffdf5;
  --border: #f5e0a0;
  --x-color: #ff6b00;
  --o-color: #ffd600;
  --x-glow: rgba(255,107,0,0.4);
  --o-glow: rgba(255,214,0,0.4);
  --text: #3a2000;
  --muted: #b8900a;
  --accent: #ff6b00;
  --font-title: 'Nunito', sans-serif;
  --font-body: 'Nunito', sans-serif;
  --font-cell: 'Nunito', sans-serif;
  --cell-radius: 50%;
  --board-gap: 10px;
}

/* SUNRISE */
body.theme-sunrise {
  --bg: #0d0221;
  --panel: #1a0535;
  --border: #3a1060;
  --x-color: #ff6b6b;
  --o-color: #ffa552;
  --x-glow: rgba(255,107,107,0.5);
  --o-glow: rgba(255,165,82,0.5);
  --text: #ffe8d6;
  --muted: #7a4466;
  --accent: #ff9f43;
  --font-title: 'Playfair Display', serif;
  --font-body: 'DM Mono', monospace;
  --font-cell: 'Playfair Display', serif;
  --cell-radius: 8px;
  --board-gap: 8px;
}

/* FOREST */
body.theme-forest {
  --bg: #0a1a0a;
  --panel: #0f1f0f;
  --border: #1e3d1e;
  --x-color: #7fff00;
  --o-color: #00e5cc;
  --x-glow: rgba(127,255,0,0.4);
  --o-glow: rgba(0,229,204,0.4);
  --text: #d4efd4;
  --muted: #446644;
  --accent: #7fff00;
  --font-title: 'Black Han Sans', sans-serif;
  --font-body: 'DM Mono', monospace;
  --font-cell: 'Black Han Sans', sans-serif;
  --cell-radius: 4px;
  --board-gap: 6px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}

/* RETRO SCANLINES */
body.theme-retro::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events: none;
  z-index: 999;
}

body.theme-retro::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 998;
}

/* SUNRISE GRADIENT BG */
body.theme-sunrise {
  background: linear-gradient(180deg, #0d0221 0%, #1a0535 40%, #3d0f5c 70%, #6b1a3d 100%);
  background-attachment: fixed;
}

/* SUNSHINE BG */
body.theme-sunshine {
  background: linear-gradient(135deg, #fff8e7 0%, #fff3d0 50%, #ffecb3 100%);
  background-attachment: fixed;
}

.container {
  width: 100%;
  max-width: 500px;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════════════ */
.screen { display: none; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
.header {
  text-align: center;
  margin-bottom: 20px;
  padding-top: 8px;
}

.title {
  font-family: var(--font-title);
  font-size: clamp(1.6rem, 7vw, 2.8rem);
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, var(--x-color), var(--accent), var(--o-color));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
  transition: all 0.4s;
}

body.theme-retro .title {
  font-size: clamp(1rem, 4vw, 1.6rem);
  text-shadow: 3px 3px var(--x-color), -3px -3px var(--o-color);
  -webkit-text-fill-color: var(--accent);
  background: none;
  animation: glitch 3s infinite;
}

@keyframes glitch {
  0%,90%,100% { text-shadow: 3px 3px var(--x-color), -3px -3px var(--o-color); }
  92% { text-shadow: -3px 3px var(--o-color), 3px -3px var(--x-color); transform: skewX(2deg); }
  94% { text-shadow: 3px -3px var(--x-color), -3px 3px var(--o-color); transform: skewX(-2deg); }
}

.subtitle {
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════════
   THEME PICKER
═══════════════════════════════════════════════════════ */
.theme-bar {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.theme-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  flex-shrink: 0;
}

.theme-dot:hover { transform: scale(1.15); }
.theme-dot.active { border-color: var(--text); box-shadow: 0 0 8px currentColor; }
.theme-dot[data-theme="dark"]    { background: linear-gradient(135deg, #ff4d6d, #4cc9f0); }
.theme-dot[data-theme="retro"]   { background: linear-gradient(135deg, #ff00ff, #00ffff); border-radius: 0; }
.theme-dot[data-theme="modern"]  { background: linear-gradient(135deg, #6c63ff, #ff6584); }
.theme-dot[data-theme="sunshine"]{ background: linear-gradient(135deg, #ff6b00, #ffd600); }
.theme-dot[data-theme="sunrise"] { background: linear-gradient(135deg, #ff6b6b, #ffa552); }
.theme-dot[data-theme="forest"]  { background: linear-gradient(135deg, #7fff00, #00e5cc); }

.theme-label {
  font-size: 0.5rem;
  text-align: center;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════════
   CARDS / BUTTONS
═══════════════════════════════════════════════════════ */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  transition: background 0.4s, border-color 0.4s;
}

body.theme-retro .card { border-radius: 0; border: 2px solid var(--border); }

.section-label {
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.mode-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

body.theme-retro .mode-btn { border-radius: 0; border: 2px solid var(--border); }

.mode-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
.mode-btn:active { transform: translateY(0); }

.mode-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }

.mode-title {
  font-family: var(--font-title);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--text);
  display: block;
}

.mode-desc {
  font-size: 0.55rem;
  color: var(--muted);
  margin-top: 3px;
  display: block;
  letter-spacing: 0.05em;
}

/* GRID SIZE SELECTOR */
.size-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}

.size-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 4px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  transition: all 0.2s;
  text-align: center;
}

.size-btn:hover { color: var(--text); border-color: var(--accent); }
.size-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(128,128,0,0.08); }

body.theme-retro .size-btn { border-radius: 0; }

/* DIFF ROW */
.diff-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.diff-btn {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 6px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  transition: all 0.2s;
  text-align: center;
}

.diff-btn:hover { color: var(--text); border-color: var(--border); }
.diff-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(128,128,0,0.05); }

body.theme-retro .diff-btn { border-radius: 0; }

/* PLAYER BTNS */
.player-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.player-btn {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  font-family: var(--font-cell);
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  transition: all 0.2s;
  text-align: center;
}

.player-btn.x { color: var(--x-color); }
.player-btn.o { color: var(--o-color); }
.player-btn.active.x { border-color: var(--x-color); background: rgba(255,77,109,0.07); box-shadow: 0 0 14px var(--x-glow); }
.player-btn.active.o { border-color: var(--o-color); background: rgba(76,201,240,0.07); box-shadow: 0 0 14px var(--o-glow); }

/* GENERAL BUTTONS */
.btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  font-family: var(--font-title);
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 8px;
}

body.theme-retro .btn { border-radius: 0; font-size: 0.65rem; }

.btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(128,128,0,0.3); }
.btn:active { transform: translateY(0); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover { color: var(--text); border-color: var(--muted); box-shadow: none; }

/* ═══════════════════════════════════════════════════════
   GAME SCREEN
═══════════════════════════════════════════════════════ */
.scoreboard {
  display: flex;
  align-items: center;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 14px;
  transition: all 0.4s;
}

body.theme-retro .scoreboard { border-radius: 0; border: 2px solid var(--border); }

.score-block {
  flex: 1;
  text-align: center;
  padding: 12px 8px;
  position: relative;
  transition: background 0.3s;
}

.score-block::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.3s;
}

.score-block.active-turn::after { opacity: 1; }
.score-block.x::after { background: var(--x-color); }
.score-block.o::after { background: var(--o-color); }
.score-block.x.active-turn { background: rgba(255,77,109,0.06); }
.score-block.o.active-turn { background: rgba(76,201,240,0.06); }

.score-label { font-size: 0.48rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
.score-name  { font-family: var(--font-title); font-size: 0.75rem; letter-spacing: 0.08em; }
.score-val   { font-family: var(--font-title); font-size: 1.5rem; line-height: 1.1; }
.score-block.x .score-name, .score-block.x .score-val { color: var(--x-color); }
.score-block.o .score-name, .score-block.o .score-val { color: var(--o-color); }

.score-divider { width: 1px; height: 50px; background: var(--border); flex-shrink: 0; }

.draw-block { padding: 0 14px; text-align: center; flex-shrink: 0; }
.draw-label { font-size: 0.45rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
.draw-val   { font-family: var(--font-title); font-size: 1.1rem; color: var(--muted); }

/* STATUS */
.status-bar {
  text-align: center;
  margin-bottom: 12px;
  min-height: 20px;
}

.status-text {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  transition: all 0.3s;
}

.status-text.x { color: var(--x-color); }
.status-text.o { color: var(--o-color); }
.status-text.win { color: var(--accent); }

/* BOARD */
.board-wrap { position: relative; margin-bottom: 14px; }

.board {
  display: grid;
  gap: var(--board-gap);
  aspect-ratio: 1;
  width: 100%;
}

.cell {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--cell-radius);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: var(--font-cell);
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  aspect-ratio: 1;
}

.cell:hover:not(.taken) { border-color: var(--accent); background: color-mix(in srgb, var(--panel) 90%, var(--accent) 10%); }
.cell.taken { cursor: default; }
.cell.x { color: var(--x-color); border-color: rgba(255,77,109,0.2); text-shadow: 0 0 16px var(--x-glow); }
.cell.o { color: var(--o-color); border-color: rgba(76,201,240,0.2); text-shadow: 0 0 16px var(--o-glow); }
.cell.win-cell.x { background: rgba(255,77,109,0.12); border-color: var(--x-color); box-shadow: 0 0 16px var(--x-glow) inset; }
.cell.win-cell.o { background: rgba(76,201,240,0.12); border-color: var(--o-color); box-shadow: 0 0 16px var(--o-glow) inset; }
.cell.pop { animation: cellPop 0.22s cubic-bezier(0.34,1.56,0.64,1); }

@keyframes cellPop {
  0%   { transform: scale(0.65); opacity: 0.4; }
  100% { transform: scale(1);    opacity: 1; }
}

/* RETRO CELL */
body.theme-retro .cell {
  border: 2px solid var(--border);
  image-rendering: pixelated;
}

body.theme-retro .cell.x::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,0,255,0.05) 3px, rgba(255,0,255,0.05) 6px);
}

/* THINKING */
.thinking-overlay {
  display: none;
  text-align: center;
  margin-top: 8px;
}

.thinking-overlay.active { display: block; }

.thinking-dots {
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}

.thinking-dots span { animation: blink 1.2s infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%,80%,100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* ACTION ROW */
.action-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.action-btn {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  transition: all 0.2s;
}

.action-btn:hover { color: var(--text); border-color: var(--muted); }
.action-btn.accent { border-color: var(--accent); color: var(--accent); }
.action-btn.accent:hover { background: rgba(128,128,0,0.06); }

body.theme-retro .action-btn { border-radius: 0; border: 2px solid var(--border); }

/* ═══════════════════════════════════════════════════════
   WIN OVERLAY
═══════════════════════════════════════════════════════ */
.win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}

.win-overlay.active { display: flex; animation: fadeIn 0.3s ease; }

.win-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 28px;
  text-align: center;
  max-width: 300px;
  width: 88%;
  position: relative;
  overflow: hidden;
}

body.theme-retro .win-card { border-radius: 0; border: 3px solid var(--accent); }

.win-card::before {
  content: '';
  position: absolute;
  top: -60%; left: -40%; right: -40%;
  height: 90%;
  border-radius: 50%;
  opacity: 0.12;
  filter: blur(40px);
}

.win-card.xw::before { background: var(--x-color); }
.win-card.ow::before { background: var(--o-color); }
.win-card.dw::before { background: var(--muted); }

.win-emoji { font-size: 2.8rem; margin-bottom: 10px; }

.win-title {
  font-family: var(--font-title);
  font-size: 1.5rem;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
  line-height: 1.2;
}

body.theme-retro .win-title { font-size: 0.9rem; }

.win-card.xw .win-title { color: var(--x-color); }
.win-card.ow .win-title { color: var(--o-color); }
.win-card.dw .win-title { color: var(--muted); }

.win-sub { font-size: 0.58rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; margin-bottom: 24px; }

.win-btns { display: flex; gap: 8px; }

.win-btn {
  flex: 1;
  padding: 12px 6px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  font-family: var(--font-body);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}

.win-btn:hover { color: var(--text); border-color: var(--muted); }
.win-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.win-btn.primary:hover { opacity: 0.9; }
body.theme-retro .win-btn { border-radius: 0; border: 2px solid var(--border); }

/* ═══════════════════════════════════════════════════════
   RESPONSIVE BOARD FONTS
═══════════════════════════════════════════════════════ */
.board[data-size="3"] .cell { font-size: clamp(1.8rem, 9vw, 3.2rem); }
.board[data-size="5"] .cell { font-size: clamp(1rem, 5vw, 1.8rem); }
.board[data-size="7"] .cell { font-size: clamp(0.7rem, 3.5vw, 1.3rem); }
.board[data-size="9"] .cell { font-size: clamp(0.55rem, 2.5vw, 1rem); }

body.theme-retro .board[data-size="3"] .cell { font-size: clamp(1rem, 5vw, 1.8rem); }
body.theme-retro .board[data-size="5"] .cell { font-size: clamp(0.7rem, 3vw, 1.1rem); }
body.theme-retro .board[data-size="7"] .cell { font-size: clamp(0.5rem, 2.5vw, 0.8rem); }
body.theme-retro .board[data-size="9"] .cell { font-size: clamp(0.4rem, 1.8vw, 0.65rem); }

/* WIN INFO BADGE */
.win-info {
  font-size: 0.52rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

/* SCROLL on small screens */
@media (max-height: 700px) {
  body { justify-content: flex-start; }
  .header { margin-bottom: 10px; }
  .theme-bar { margin-bottom: 10px; }
}
</style>
</head>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="win-overlay">
  <div class="win-card" id="win-card">
    <div class="win-emoji" id="win-emoji">🎉</div>
    <div class="win-title" id="win-title">X GEWINNT!</div>
    <div class="win-info"  id="win-info"></div>
    <div class="win-sub"   id="win-sub">Runde gewonnen</div>
    <div class="win-btns">
      <button class="win-btn" onclick="goMenu()">Menü</button>
      <button class="win-btn primary" onclick="closeWinReset()">Nochmal</button>
    </div>

<script>
// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const G = {
  theme:      'dark',
  mode:       'solo',
  difficulty: 'easy',
  humanSym:   'X',
  aiSym:      'O',
  p1Sym:      'X',
  size:       3,
  winLen:     3,
  board:      [],
  current:    'X',
  over:       false,
  scores:     { X:0, O:0, D:0 },
};

// Win length by grid size
const WIN_LENGTHS = { 3:3, 5:4, 7:5, 9:6 };

// ── THEMES ────────────────────────────────────────────────
function setTheme(t) {
  G.theme = t;
  document.body.className = 'theme-' + t;
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.theme === t);
  });
}

// ── NAVIGATION ────────────────────────────────────────────
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu() {
  closeWin();
  goTo('screen-menu');
}

// ── SETUP ─────────────────────────────────────────────────
function setSize(btn, s) {
  G.size = s;
  G.winLen = WIN_LENGTHS[s];
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setDiff(btn, d) {
  G.difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function chooseSymbol(sym) {
  G.humanSym = sym;
  G.aiSym    = sym === 'X' ? 'O' : 'X';
  document.getElementById('choose-x').classList.toggle('active', sym === 'X');
  document.getElementById('choose-o').classList.toggle('active', sym === 'O');
}

function setP1(sym) {
  G.p1Sym = sym;
  document.getElementById('p1-x').classList.toggle('active', sym === 'X');
  document.getElementById('p1-o').classList.toggle('active', sym === 'O');
}

function startSolo() {
  G.mode = 'solo';
  G.scores = {X:0,O:0,D:0};
  initGame();
  goTo('screen-game');
  updateNames();
  if (G.current === G.aiSym) scheduleAI();
}

function startMulti() {
  G.mode = 'multi';
  G.scores = {X:0,O:0,D:0};
  initGame();
  goTo('screen-game');
  updateNames();
}

function updateNames() {
  if (G.mode === 'solo') {
    const hx = G.humanSym === 'X';
    document.getElementById('name-x').textContent = hx ? 'DU' : 'KI';
    document.getElementById('name-o').textContent = hx ? 'KI' : 'DU';
  } else {
    const p1x = G.p1Sym === 'X';
    document.getElementById('name-x').textContent = p1x ? 'SP1' : 'SP2';
    document.getElementById('name-o').textContent = p1x ? 'SP2' : 'SP1';
  }
}

// ══════════════════════════════════════════════════════════
//  GAME CORE
// ══════════════════════════════════════════════════════════
function initGame() {
  const n = G.size;
  G.board   = Array(n * n).fill('');
  G.current = 'X';
  G.over    = false;
  renderBoard();
  updateStatus();
  updateScoreboard();
  closeWin();
  document.getElementById('thinking').classList.remove('active');
}

function resetRound() {
  initGame();
  if (G.mode === 'solo' && G.current === G.aiSym) scheduleAI();
}

function renderBoard() {
  const el = document.getElementById('board');
  const n  = G.size;
  el.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
  el.dataset.size = n;
  el.innerHTML = '';

  G.board.forEach((v, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (v ? ` taken ${v.toLowerCase()}` : '');
    cell.textContent = v === 'X' ? '✕' : v === 'O' ? '○' : '';
    cell.dataset.i = i;
    if (!v && !G.over) cell.addEventListener('click', () => handleClick(i));
    el.appendChild(cell);
  });
}

function handleClick(i) {
  if (G.over || G.board[i]) return;
  if (G.mode === 'solo' && G.current === G.aiSym) return;
  makeMove(i);
  if (!G.over && G.mode === 'solo') scheduleAI();
}

function makeMove(i) {
  G.board[i] = G.current;
  renderBoard();
  animCell(i);

  const res = checkWin(G.board);
  if (res) { endGame(res); return; }
  if (G.board.every(c => c)) { endGame('draw'); return; }

  G.current = G.current === 'X' ? 'O' : 'X';
  updateStatus();
}

function animCell(i) {
  const cells = document.querySelectorAll('.cell');
  cells[i]?.classList.add('pop');
  setTimeout(() => cells[i]?.classList.remove('pop'), 220);
}

function updateStatus() {
  const el  = document.getElementById('status-text');
  const sym = G.current;
  const disp = sym === 'X' ? '✕' : '○';
  let label;

  if (G.mode === 'solo') {
    label = sym === G.humanSym ? `Dein Zug  ${disp}` : `KI denkt  ${disp}`;
  } else {
    const isP1 = G.p1Sym === sym;
    label = `${isP1 ? 'Spieler 1' : 'Spieler 2'}  ${disp}`;
  }

  el.textContent = label;
  el.className = `status-text ${sym.toLowerCase()}`;
  document.getElementById('score-x').classList.toggle('active-turn', sym === 'X');
  document.getElementById('score-o').classList.toggle('active-turn', sym === 'O');
}

function updateScoreboard() {
  document.getElementById('pts-x').textContent    = G.scores.X;
  document.getElementById('pts-o').textContent    = G.scores.O;
  document.getElementById('pts-draw').textContent = G.scores.D;
}

// ══════════════════════════════════════════════════════════
//  WIN CHECK (flexible grid + win length)
// ══════════════════════════════════════════════════════════
function checkWin(board) {
  const n  = G.size;
  const wl = G.winLen;

  // rows
  for (let r = 0; r < n; r++) {
    for (let c = 0; c <= n - wl; c++) {
      const base = r * n + c;
      const sym  = board[base];
      if (!sym) continue;
      if (Array.from({length:wl}, (_,k) => board[base+k]).every(v => v === sym))
        return { winner: sym, line: Array.from({length:wl}, (_,k) => base+k) };
    }
  }
  // cols
  for (let c = 0; c < n; c++) {
    for (let r = 0; r <= n - wl; r++) {
      const base = r * n + c;
      const sym  = board[base];
      if (!sym) continue;
      if (Array.from({length:wl}, (_,k) => board[base+k*n]).every(v => v === sym))
        return { winner: sym, line: Array.from({length:wl}, (_,k) => base+k*n) };
    }
  }
  // diag down-right
  for (let r = 0; r <= n - wl; r++) {
    for (let c = 0; c <= n - wl; c++) {
      const base = r * n + c;
      const sym  = board[base];
      if (!sym) continue;
      if (Array.from({length:wl}, (_,k) => board[base+k*(n+1)]).every(v => v === sym))
        return { winner: sym, line: Array.from({length:wl}, (_,k) => base+k*(n+1)) };
    }
  }
  // diag down-left
  for (let r = 0; r <= n - wl; r++) {
    for (let c = wl - 1; c < n; c++) {
      const base = r * n + c;
      const sym  = board[base];
      if (!sym) continue;
      if (Array.from({length:wl}, (_,k) => board[base+k*(n-1)]).every(v => v === sym))
        return { winner: sym, line: Array.from({length:wl}, (_,k) => base+k*(n-1)) };
    }
  }
  return null;
}

function endGame(result) {
  G.over = true;
  document.getElementById('thinking').classList.remove('active');

  if (result === 'draw') {
    G.scores.D++;
    updateScoreboard();
    setTimeout(() => showWin('draw'), 400);
    return;
  }

  const w = result.winner;
  G.scores[w]++;
  updateScoreboard();
  highlightWin(result.line);
  setTimeout(() => showWin(w), 500);
}

function highlightWin(line) {
  const cells = document.querySelectorAll('.cell');
  line.forEach(i => cells[i]?.classList.add('win-cell'));
}

function showWin(outcome) {
  const card  = document.getElementById('win-card');
  const emoji = document.getElementById('win-emoji');
  const title = document.getElementById('win-title');
  const info  = document.getElementById('win-info');
  const sub   = document.getElementById('win-sub');

  card.className = 'win-card';

  const sizeLabel = `${G.size}×${G.size} · ${G.winLen} in Reihe`;

  if (outcome === 'draw') {
    card.classList.add('dw');
    emoji.textContent = '🤝';
    title.textContent = 'UNENTSCHIEDEN';
    info.textContent  = sizeLabel;
    sub.textContent   = 'Keine freien Felder mehr!';
  } else {
    const disp = outcome === 'X' ? '✕' : '○';
    let name;
    if (G.mode === 'solo') {
      name = outcome === G.humanSym ? 'DU GEWINNST! 🏆' : 'KI GEWINNT! 😈';
    } else {
      name = (G.p1Sym === outcome ? 'SPIELER 1' : 'SPIELER 2') + ' GEWINNT!';
    }
    card.classList.add(outcome.toLowerCase() + 'w');
    emoji.textContent = outcome === G.humanSym || G.mode === 'multi' ? '🏆' : '😈';
    title.textContent = name;
    info.textContent  = sizeLabel;
    sub.textContent   = `Zeichen: ${disp}`;
  }

  document.getElementById('win-overlay').classList.add('active');
}

function closeWin() { document.getElementById('win-overlay').classList.remove('active'); }
function closeWinReset() { closeWin(); resetRound(); }

// ══════════════════════════════════════════════════════════
//  AI  — varied, strategic, not robotic
// ══════════════════════════════════════════════════════════
function scheduleAI() {
  if (G.over) return;
  const delays = { easy: [400,700], medium: [500,900], hard: [400,700] };
  const [lo,hi] = delays[G.difficulty];
  const delay   = lo + Math.random() * (hi - lo);
  document.getElementById('thinking').classList.add('active');
  setTimeout(() => {
    document.getElementById('thinking').classList.remove('active');
    if (!G.over) {
      const mv = getAIMove();
      if (mv !== -1) makeMove(mv);
    }
  }, delay);
}

function getAIMove() {
  const board = G.board.slice();
  const ai    = G.aiSym;
  const human = G.humanSym;
  const empty = board.map((v,i) => v==='' ? i : -1).filter(i => i !== -1);
  if (!empty.length) return -1;

  // ── EASY: random + occasional smart moves ──────────────
  if (G.difficulty === 'easy') {
    // 10% chance: win if possible
    if (Math.random() < 0.10) {
      const win = findImmediate(board, ai);
      if (win !== -1) return win;
    }
    // Varied random with slight center bias
    return weightedRandom(board, empty, 0.3);
  }

  // ── MEDIUM: strategic but makes mistakes ───────────────
  if (G.difficulty === 'medium') {
    if (Math.random() < 0.15) return empty[Math.floor(Math.random() * empty.length)];

    // Win if possible
    const win = findImmediate(board, ai);
    if (win !== -1) return win;

    // Block if threatened
    if (Math.random() < 0.8) {
      const block = findImmediate(board, human);
      if (block !== -1) return block;
    }

    // Fork or strategic
    if (Math.random() < 0.6) {
      const fork = findFork(board, ai);
      if (fork !== -1) return fork;
    }

    return weightedRandom(board, empty, 0.5);
  }

  // ── HARD: near-perfect with slight variation ──────────
  // Always win if possible
  const win = findImmediate(board, ai);
  if (win !== -1) return win;

  // Always block immediate threats
  const block = findImmediate(board, human);
  if (block !== -1) return block;

  // Try to create fork
  const fork = findFork(board, ai);
  if (fork !== -1) {
    // Small chance to deviate on large boards
    if (G.size > 3 && Math.random() < 0.1) return weightedRandom(board, empty, 0.6);
    return fork;
  }

  // Block opponent fork
  const oppFork = findFork(board, human);
  if (oppFork !== -1) return oppFork;

  // Strategic position with some randomness
  return strategicMove(board, empty, ai);
}

// Find immediate win/block
function findImmediate(board, sym) {
  const empty = board.map((v,i) => v==='' ? i : -1).filter(i => i !== -1);
  for (const i of empty) {
    const b2 = board.slice(); b2[i] = sym;
    if (checkWin(b2)) return i;
  }
  return -1;
}

// Find fork (two ways to win)
function findFork(board, sym) {
  const empty = board.map((v,i) => v==='' ? i : -1).filter(i => i !== -1);
  // Shuffle to add variation
  shuffle(empty);
  for (const i of empty) {
    const b2 = board.slice(); b2[i] = sym;
    const wins = countThreats(b2, sym);
    if (wins >= 2) return i;
  }
  return -1;
}

function countThreats(board, sym) {
  let count = 0;
  const empty = board.map((v,i) => v==='' ? i : -1).filter(i => i !== -1);
  for (const i of empty) {
    const b2 = board.slice(); b2[i] = sym;
    if (checkWin(b2)) count++;
  }
  return count;
}

// Strategic move: prefer center, near-center, corners
function strategicMove(board, empty, sym) {
  const n = G.size;

  // Prefer center area
  const cx = Math.floor(n / 2);
  const center = cx * n + cx;
  if (board[center] === '') return center;

  // Corners
  const corners = [0, n-1, n*(n-1), n*n-1].filter(i => board[i] === '');
  if (corners.length) {
    // Pick random corner with slight bias
    shuffle(corners);
    return corners[0];
  }

  // Near center cells
  const near = [];
  for (let r = cx-1; r <= cx+1; r++) {
    for (let c = cx-1; c <= cx+1; c++) {
      if (r>=0 && c>=0 && r<n && c<n) {
        const i = r*n+c;
        if (board[i]==='') near.push(i);
      }
    }
  }
  if (near.length) { shuffle(near); return near[0]; }

  shuffle(empty);
  return empty[0];
}

// Weighted random: higher weight for center area
function weightedRandom(board, empty, centerBias) {
  const n  = G.size;
  const cx = Math.floor(n/2);

  if (Math.random() < centerBias) {
    // Try to pick something near center
    const near = empty.filter(i => {
      const r = Math.floor(i/n), c = i%n;
      return Math.abs(r-cx) <= 1 && Math.abs(c-cx) <= 1;
    });
    if (near.length) return near[Math.floor(Math.random()*near.length)];
  }

  const copy = empty.slice();
  shuffle(copy);
  return copy[0];
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
